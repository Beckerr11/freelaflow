services:
  - type: web
    name: freelaflow-api
    env: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /health
  - type: static
    name: freelaflow-web
    rootDir: frontend
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
